version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: Materias_db
      POSTGRES_USER: JEAN
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql